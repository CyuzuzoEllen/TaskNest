<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskNest – Daily Task Manager</title>
  <meta name="description"
    content="TaskNest is a daily task manager that helps you organize your day and achieve your goals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="header" id="header">
    <div class="header__inner">
      <div class="header__brand">
        <svg class="header__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4" />
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
        </svg>
        <h1 class="header__title">TaskNest</h1>
      </div>
      <div class="header__right">
        <p class="header__tagline">Daily Task Manager</p>
        <div class="header__user" id="header-user">
          <div class="header__avatar" id="header-avatar"></div>
          <span class="header__username" id="header-username"></span>
          <button class="btn btn--logout" id="logout-btn" type="button">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- ===== WELCOME BANNER ===== -->
    <section class="welcome" id="welcome-banner">
      <h2 class="welcome__heading">Welcome to TaskNest</h2>
      <p class="welcome__text">Organize your day, achieve your goals.</p>
    </section>

    <!-- ===== STATS BAR ===== -->
    <section class="stats" id="stats-bar">
      <div class="stats__card">
        <span class="stats__number" id="stat-total">0</span>
        <span class="stats__label">Total</span>
      </div>
      <div class="stats__card stats__card--completed">
        <span class="stats__number" id="stat-completed">0</span>
        <span class="stats__label">Completed</span>
      </div>
      <div class="stats__card stats__card--pending">
        <span class="stats__number" id="stat-pending">0</span>
        <span class="stats__label">Pending</span>
      </div>
    </section>

    <!-- ===== ADD TASK FORM ===== -->
    <section class="form-section" id="form-section">
      <h2 class="section-title">Add a New Task</h2>
      <form class="task-form" id="task-form" novalidate>
        <div class="task-form__group">
          <label class="task-form__label" for="task-title">Title <span class="required">*</span></label>
          <input class="task-form__input" type="text" id="task-title" placeholder="What needs to be done?" required />
          <span class="task-form__error" id="title-error">Please enter a task title.</span>
        </div>
        <div class="task-form__group">
          <label class="task-form__label" for="task-desc">Description</label>
          <textarea class="task-form__input task-form__textarea" id="task-desc"
            placeholder="Add some details (optional)" rows="3"></textarea>
        </div>
        <div class="task-form__group">
          <label class="task-form__label" for="task-date">Due Date</label>
          <input class="task-form__input" type="date" id="task-date" />
        </div>
        <button class="btn btn--primary task-form__submit" type="submit" id="add-task-btn">
          <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add Task
        </button>
      </form>
    </section>

    <!-- ===== FILTER BAR ===== -->
    <section class="filter-bar" id="filter-bar">
      <h2 class="section-title">Your Tasks</h2>
      <div class="filter-bar__buttons">
        <button class="btn btn--filter active" data-filter="all" id="filter-all">All</button>
        <button class="btn btn--filter" data-filter="completed" id="filter-completed">Completed</button>
        <button class="btn btn--filter" data-filter="pending" id="filter-pending">Pending</button>
      </div>
    </section>

    <!-- ===== TASK LIST ===== -->
    <section class="task-list" id="task-list">
      <!-- Task cards rendered by JS -->
      <div class="task-list__empty" id="empty-state">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <path d="M9 12h6" />
        </svg>
        <p>No tasks yet. Add one above to get started!</p>
      </div>
    </section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer" id="footer">
    <p>&copy; 2026 TaskNest. Stay organized, stay productive.</p>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
